{% extends 'app/base.html' %}

{% block content %}

<table class="table table-bordered">
    <thead>
        <th>Title</th>
        <th>Image</th>
        <th>Description</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Action</th>
    </thead>

    <tbody>
       {% for product in products %}
        <tr>
            <td>{{product.title}}</td>
            <td><img src='{{product.img.url}}' width="100%"></td>
            <td>{{product.des}}</td>
            <td>{{product.price}}</td>
            <td>{{product.quantity}}</td>
            <td><a href="{% url 'removecart' product.id %}" class="btn btn-danger">Remove</a></td>
        </tr>
        
        {% endfor %}
       
    </tbody>
</table>

 <h1>Total: {{total}}</h1>
{% endblock %}
