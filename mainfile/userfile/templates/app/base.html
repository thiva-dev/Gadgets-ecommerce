<nav class="navbar navbar-expand-lg navbar-dark bg-dark p-4 fixed-top">
  <div class="container-fluid text-light">
    <a class="navbar-brand text-light" href="/">Sound</a>

    <!-- Toggle Button --> 
    <button  class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div
      class="offcanvas offcanvas-start bg-dark text-light"
      tabindex="-1"
      id="mobileMenu"
    >
      <div class="offcanvas-header">
        <h5 class="offcanvas-title">Menu</h5>
        <button
          type="button"
          class="btn-close btn-close-white"
          data-bs-dismiss="offcanvas"
        ></button>
      </div>

      <div class="offcanvas-body">
        <div class="navbar2 ms-1 ms-5">
          <form class="d-flex" method="GET" action="{% url 'search' %}">
            <input class="form-control me-2" type="search" placeholder="Search" name="q"/>
            <button class="btn btn-outline-danger pe-4" type="submit">
              Search
            </button>
          </form>
        </div>

        <div class="navbar1 ms-3">
          <ul class="nav1">
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="{% url 'about' %}">About</a></li>
            <li><a href="{% url 'product' %}">Product</a></li>
            <li>
              <a href="{% url 'cart_view' %}">
                <i class="bi bi-cart-check-fill"></i>
              </a>
            </li>
            <li><a href="{% url 'contact' %}">Contact</a></li>

            <li>
              <a href="{% url 'login' %}">
                <i class="bi bi-person-fill-check"></i>
              </a>
            </li>
            <li>
              <a href="{% url 'signin' %}">
                <i class="bi bi-person-add"></i>
              </a>
            </li>

            <!--
            <li>
              <a href="{% url 'adminproduct' %}">
                <i class="bi bi-card-list"></i>
              </a>
            </li>
            -->
          </ul>
        </div>
      </div>
    </div>
    <!-- Offcanvas End -->
  </div>
</nav>


    {% block content %} 
    
    {% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-element-bundle.min.js"></script>

    <script src="{% static 'app/index.js' %}"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

      crossorigin="anonymous"
    ></script>
